spring.application.name=customer-management-api

# ??????????????????????????????????????????????
# JPA
# ??????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ??????????????????????????????????????????????
# PostgreSQL
# Los valores se inyectan desde variables de entorno.
# En local sin Docker usan el valor por defecto (:= valor).
# En Docker, docker-compose sobreescribe estas variables.
# ??????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/customer_management_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Admin4postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ??????????????????????????????????????????????
# Server
# ??????????????????????????????????????????????
server.port=${SERVER_PORT:8080}

# ??????????????????????????????????????????????
# Flyway
# ??????????????????????????????????????????????
spring.flyway.enabled=true
spring.flyway.locations=classpath:migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0